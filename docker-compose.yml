services:
  postgres:
    image: postgres:16-alpine
    container_name: project-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_hit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./my-backend
    container_name: project-backend
    restart: unless-stopped
    depends_on:
      - postgres
    command: sh -c "npx prisma migrate deploy && npm start"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_hit
      JWT_SECRET: supersecret
      JWT_REFRESH_SECRET: superrefreshsecret
      GITHUB_TOKEN_ENC_KEY: "ul1oAv+hfOLFs7SAPRWALG+hFxylqfCr5N45LBunQ0c="
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./my-frontend
    container_name: project-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  ollama:
    image: ollama/ollama:latest
    container_name: project-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       sleep 3 &&
       ollama pull qwen2.5-coder:7b &&
       ollama pull nomic-embed-text &&
       wait"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  ai-service:
    build:
      context: ./ai-service
    container_name: project-ai-service
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      AI_PROJECT_ROOT: /workspace
      AI_INCLUDE_DIRS: my-backend,my-frontend
      AI_AUTO_INDEX_ON_STARTUP: "false"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: qwen2.5-coder:7b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_TIMEOUT_SECONDS: 300
      RUNNER_TIMEOUT_SECONDS: 10
      RUNNER_MEMORY_LIMIT: 256m
      RUNNER_CPU_LIMIT: 0.5
      RUNNER_PIDS_LIMIT: 64
      RUNNER_OUTPUT_LIMIT: 20000
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace:ro
      - ai_vector_db:/app/vector-db
      - ai_embeddings:/app/embeddings

volumes:
  postgres_data:
  ai_vector_db:
  ai_embeddings:
  ollama_data:
